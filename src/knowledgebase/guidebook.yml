wbs:
  description: Что такое WBS / Wohnberechtigungsschein
  contents:
    Что это такое:
      - |
        WohnBerechtigungsSchein - сертификат, дающий право претендовать на "социальное" жильё. Чаще всего на сайтах доступные (в соц. рамках) квартиры сдаются только с WBS.
    Что нужно:
      - ВНЖ, действительный как минимум на 11 месяцев с момента подачи заявки
      - прописка
      - сведения о доходах - Leistungsbescheid (распечатка от Sozialamt или от Jobcenter, о получении соц. помощи)
      - паспорта всех членов семьи
      - |
        свидетельства о браке, о разводе (если в разводе), о рождении детей - всё, что есть - с переводом
    Как получить:
      - делаете копии со всех документов
      - заполняете анкету/анкеты онлайн https://service.berlin.de/dienstleistung/120671/ либо на бумаге https://www.berlin.de/sen/sbw/service/formularcenter/bereich-wohnen/wohnungswirtschaftliche-bescheinigungen/
      - |
        отдаёте всё это либо в Bürgeramt по прописке на информации (они сами направят куда надо), либо идёте сами в Wohnungsamt своего района (если они принимают, отдаёте лично, либо посылаете/кидаете в почтовый ящик)
    Вся информация на сайте:
      - https://service.berlin.de/dienstleistung/120671/

lost_passport:
  description: Утеря документов - что делать?
  contents:
    Утеря или кража паспорта с ВНЖ:
      - Заявление в полицию об утере/краже документов.
      - Термин на оформление нового заграна в консульстве или центра "Документ".
      - |
        Оформление нового ВНЖ

        Ссылка на формуляр обращения в реферат M TF: https://www.berlin.de/einwanderung/ueber-uns/kontakt/formular.1605502.php. Из выпадающего списка тем выбрать eAT (elektronischer Aufenthaltstitel) - Neubestellung nach Verlust oder wenn alter Pass nicht mehr vorhanden ist

        В тексте опишите ситуацию с утерей и сроками изготовления нового украинского паспорта: возможно/невозможно/подали/почему не можете подать/какие сроки изготовления. Просите срочный термин на восстановление ВНЖ.
        
        Guten Tag,
        
        hiermit erbitte ich einen Vorsprachetermin zur Austellung eines neuen Aufenthaltstitels wegen Passverlustes. 

        Mit freundlichen Grüßen
        Имя Фамилия
        
        Приложите все имеющиеся копии: заявление в полицию, копии утерянного внж и паспорта, прописка, и термин на подачу паспорта в украинское консульство.

        ‼️**ВНЖ может быть выдан только при наличии действующего загранпаспорта.
        #внж #lea #документ
