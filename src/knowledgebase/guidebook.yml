schufa:
  description: Как получить справку Schufa
  contents:
    - |
      Schufa - документ, подтверждающий Вашу кредитную историю. Есть два вида Schufa: 
      
      1. Сертификат о кредитоспособности Bonitätscheck - всегда платный. Можно заказать онлайн на сайте https://www.meineschufa.de (29,95 EUR).
      
      2. Копия ваших данных Datenkopie. Можно заказать бесплатно только на сайте Schufa: https://www.meineschufa.de/de/datenkopie. Бесплатную Datenkopie можно запрашивать несколько раз в год. Schufa имеет право отказать в ее выдаче при чрезмерно частых запросах.
    - |   
      Получение Schufa-Datenkopie может занять до 4 недель.
      Вариант Schufa-Bonitätscheck - быстрее.

      При оформлении подписки MieterPlus на Immobilienscout24.de на 3 - 12 месяцев можно получить скидку на Schufa-сертификат о кредитоспособности Bonitätscheck.
search:
  description: Как самостоятельно искать информацию в Интернете
  contents:
    - |
      Иногда ответы на «справочные» вопросы гораздо быстрее найти в поисковике Гугл, чем спрашивать в группе. Например:

      1. Если Вы ищете адрес Джобцентра Штеглиц-Целендорф — откройте maps.google.com и забейте «jobcenter steglitz zehlendorf». В результатах поиска будут часы открытия ДЦ.

      2. Если Вы ищете русскоговорящих врачей в Берлине - откройте google.com и забейте «врач Берлин по-русски».

      3. Если Вас интересуют границы зон A, B и C в Берлине: забейте «Berlin ABC» и переключитесь на поиск картинок. Вам покажут миллион разных карт с этими зонами.

      4. Если у Вас трудности с переводом немецкого слова, обозначающим какой-то конкретный предмет, например «Zwiebelmett»: забейте «Zwiebelmett» в поиск и переключитесь на поиск картинок — Вам покажут миллион картинок с цвибельметтом.
simcards:
  description: Где получить сим-карту
  contents:
    Для украинцев доступны специальные льготные тарифы у следующих компаний:
      - Telekom (https://www.telekom.de/hilfe/prepaid-ukraine-ua) предлагает специальный тарифы за 10€/4 недели (10 Гб, 300 минут в Украину). Оформить сим-карту можно в любом филиале оператора, из документов нужен только паспорт.
      - Если нужен безлимитный интернет, можно воспользоваться тарифом от Freenet за 0,99€/день (https://www.freenet-funk.de).
      - Если есть украинская сим-карта или смартфон поддерживает eSIM, можно подключить роуминг и пользоваться своим домашним тарифом, находясь в Германии.
social_discounts:
  description: Информация о скидках получателям социальной помощи в Берлине
  contents:
    - |
      Получатели соц. помощи в Берлине (от Sozialamt, Jobcenter, Wohngeld) имеют право на социальные скидки на:
      - проезд 
      - бассейны
      - библиотеки
      - зоопарки и все платные парки Берлина
      - театр, кино
      - музеи
      Полный список скидок можно посмотреть тут: https://www.berlin.de/sen/soziales/soziale-sicherung/bn-berlin-ticket-s/angebote/

      ❓Как получить скидку: Предьявить первую страницу Bescheid о получении соц. помощи.
      
      ‼️ВНИМАНИЕ: Для того, чтобы пользоваться соц. проездным, необходимо вписать в него полное имя и фамилию. Без этой информации проездной недействителен. Штраф 60 евро. 

      Для детей сохраняется Berlinpass, который дает право на бесплатные поездки в школе/садике, питание, доп. занятия. Смотрите “Berlinpass BuT”:
      https://but-beratung.de/ru/

      #berlinpass #berlinpassbut
