furniture:
  description: Оформление заявки на мебель и бытовые приборы первой необходимости
  contents:
      - |
        Оформление заявки на мебель и бытовые приборы первой необходимости
        Заявка оформляется ДО совершения покупок. Если вы купите мебель и бытовые приборы, а только потом оформите заявку, вам могут отказать. 
        В Jobcenter (в случае переезда - в старый Jobcenter) необходимо предоставить:
        - Договор аренды (подписанный обоими сторонами)
        - Протокол приёмки-передачи квартиры (некоторые Jobcenter выдают деньги без него, но это больше исключение, чем правило)
        - Размеры окон (для того, чтобы вам выделили сумму на занавески)
        - Cписок необходимой мебели и бытовых приборов с разбивкой по комнатам   

        Полный список (2 файла), что и по какой цене выделяют на обустройство квартиры:
        📄 https://www.berlin.de/sen/soziales/service/berliner-sozialrecht/kategorie/rundschreiben/2017_06-658136.php
        📄 https://www.berlin.de/sen/soziales/service/berliner-sozialrecht/kategorie/rundschreiben/2017_06_anlage1-659044.php

        Необходимо сохранять все чеки о покупках. Если покупка совершена, например, на ebay Kleinanzeige - брать расписку (или квитанцию Quittung) у продавца о получении денег за товар.
