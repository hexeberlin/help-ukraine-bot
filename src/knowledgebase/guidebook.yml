deutschlandticket:
  description: Информация о Deutschlandticket 
  contents:
    - |
      🎟️ Билет Deutschlandticket за 63 EUR доступен только в виде абонемента. Оформить его можно онлайн на сайте/в приложении DB или BVG, а также офлайн, заполнив заявку в кассах S-Bahn или BVG. В данном случае пластиковая карта абонемента выдается на месте. 
      Для оформления Deutschlandticket в большинстве случаев требуется европейский номер IBAN (банковский счёт). Приложение hvv switch предлагает оплату кредитной картой или Paypal. Приложение mopla предлагает оплату украинской банковской картой. 
      
      🗺️ Билет действует по всей Германии практически на все региональные поезда (RB-, RE-, S-Bahn) и городской транспорт (автобусы, трамваи, U-Bahn). 
      
      ⛔️Билет НЕ действует на скоростные поезда (IC, EC, ICE, FlixTrain), междугородние автобусы и такси.  
      или проложить маршрут на сайте, выбрав „mit Deutschland-Ticket“: https://bahnapp.online/
      В приложении DB Navigator есть опция прокладывать маршрут только на RE, но к сожалению, он не учитывает исключения, описанные выше 👆

      ❌ Отменить подписку на Deutschlandticket можно, как правило, до 10-го числа каждого месяца в личном кабинете того оператора, у которого вы приобрели абонемент (DB, BVG, и т.д.)

      👶 Бесплатно можно перевозить с собой детей до шести лет.
      🚳 Для велосипедов и домашних животных требуется обычный билет согласно региональным правилам (в Берлине и Бранденбурге разрешено бесплатно брать с собой собаку)
      🪪 Deutschlandticket именной, поэтому передавать другим лицам его нельзя. Без удостоверения личности считается недействительным.

      ℹ️ FAQ: https://www.vbb.de/abonnements/deutschlandticket/
