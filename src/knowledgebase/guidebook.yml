return_to_ukraine:
  description: Возвращение в Украину
  contents:
    - |
      ✅ Алгоритм действий при возвращении в Украину:

      1. Отказаться от пособий через электронную почту или лично в соответствующей инстанции.
      Отказаться нужно от всех пособий: Sozialamt, Jobcenter, Kindergeld и т.д..

      Подготовьте такое письмо:

      Sehr geehrte Damen und Herren,

      Ich habe am XX (число, когда вы оформляли документы) XX (для Jobcenter:
        Bürgergeld als Geflüchtete:r aus Ukraine) / (для Sozialamt:
        Leistungen nach AsylbLG beantragt) / (для Familienkasse: Kindergeld) beantragt. Aus persönlichen Gründen bitte ich Sie die Zahlungen zum (число, с которого выплаты должны прекратиться) einzustellen und mich entsprechend abzumelden.
      Meine Daten:
        - Имя, Фамилия (ваша и/или детей)
        - идентификационный номер в Jobcenter/Sozialamt/Familienkasse
        - дата рождения
        - электронная почта

      Bitte senden Sie mir eine schriftliche Bestätigung an meine E-Mail-Adresse zu.

      Mit freundlichen Grüßen

      Имя, фамилия

      2. Если у Вас есть дети, и они ходят в немецкую школу/садик, то обязательно сообщаете им об отъезде. В садике пишите расторжение договора - Kündigung des Kinderbetreungvertrages.

      3. Если Вы прописаны где-то (Anmeldung), то необходимо выписаться из квартиры - сделать Abmeldung einer Wohnung в Bürgeramt. Это также можно сделать по почте: https://service.berlin.de/dienstleistung/120335.

      4. Закрываете счет в банке.

      5. Расторгаете договор аренды.
      Будьте внимательны, многие договоры предусматривают минимальный срок для расторжения договора (Kündigungsfrist) в 3 месяца. Это значит, что за 3 месяца до отъезда Вы обязаны предупредить арендодателя об отъезде. Если Вы не укладываетесь в срок 3 месяца, то обязательно поговорите с арендодателем. Он может пойти вам на встречу и расторгнуть договор раньше. В противном случае вы продолжаете платить за квартиру все 3 месяца.
      Квартиру нужно сдать в том виде, в котором Вы её сняли. Мебель, эл. приборы и т.д. необходимо вывезти (не выставить перед подъездом) в пункты сбора мусора. Куда - можно узнать у хозяина квартиры. В некоторых городах есть так называемые Entrümpelungsfirmen. За определенную сумму они освободят квартиру и вывезут всё куда нужно.

      6. Расторгаете договор на свет, газ, интернет, мобильный номер. Многое можно расторгнуть онлайн. Тут тоже обращайте внимание на минимальный срок для расторжения договора (Kündigungsfrist).

      7. Расторгаете договор с медицинской страховкой. Для этого нужно отослать им ваше подтверждение о выписке (Abmeldung einer Wohnung). Иначе даже после вашего отъезда будут начисляться платежи в размере минимум 200 евро/месяц. Расторгаете договоры со всеми остальными страховками (например, Haftpflichtversicherung).

      8. Вспоминаете, что ещё Вы оформляли в Германии: спорт, кружки для ребенка, подписки на онлайн-сервисы. Все эти договоры нужно расторгнуть.

      9. Миграционная служба.

      Если вы получили только Fiktionsbescheinigung, но НЕ хотите или не можете ждать пластиковый ВНЖ, пишите в миграционную службу сообщение через формуляр https://www.berlin.de/einwanderung/ueber-uns/kontakt/formular.1605502.php:

      Sehr geehrte Damen und Herren,

      aus persönlichen Gründen bitte ich Sie meine Registrierung als Schutzsuchende nach §24 AufenthG zu annullieren.

      Meine Daten:
        - имя фамилия
        - дата рождения

      Bitte senden Sie mir eine schriftliche Bestätigung an die folgende E-Mail-Adresse: ваш эл.адрес zu.

      Mit freundlichen Grüßen

      Имя Фамилия

      Если Вы уже получили ВНЖ, то возвращайтесь домой, не отказываясь от вида на жительство в Германии. С вклейкой или картой Вы имеете право до 6 месяцев жить за границей, в том числе и в Украине. Не жгите все мосты. Никто не знает, что будет через пару месяцев.

      Спасибо @afasode_ves за текст 💙💛
rundfunk:
  description: Освобождение от сбора на радио, ТВ и Интернет
  contents:
    Инструкция по заполнению освобождения от налога на радио, ТВ и Интернет:
      - |
        Если вы уже получили от Jobcenter бланк "Bescheinigung über Leistungsbezug zur Vorlage beim Beitragsservice von ARD, ZDF und Deutschlandradio", нужно отослать этот бланк в Rundfunkbeitrag, оформив задним числом Befreiung (освобождение от уплаты налога) на их сайте: https://www.rundfunkbeitrag.de/buergerinnen_und_buerger/formulare/befreiung_oder_ermaessigung_beantragen/index_ger.html
    Пошаговая инструкция:
        - 1. Кликаем на "Befreiung/Ermäßigung beantragen".
        - 2. Кликаем на „aus sozialen Gründen".
        - 3. Кликаем на „ALG II (Hartz IV)".
        - 4. На первый вопрос "Sie sind bereits mit einer Wohnung angemeldet?" (зарегистрировали ли вы уже эту квартиру на этом сайте) отвечаем "nein".
        - 5. На вопрос "Anmeldung zu" ставим ту дату, с которой у вас начинается договор на квартиру. Внимание - эта дата должна совпадать с той датой, которая стоит на бланке от Jobcenter. Именно с этой даты у вас и начинается освобождение от налога на радио и ТВ.
        - 6. Далее заполняем формуляр на имя того человека, который указан в бланке от Jobcenter.
        - 7. Кликаем на "Antrag erstellen" и потом на „drucken“.
        - |
          8. Откроется PDF документ, если нет, сохраняем полученный PDF документ на своем устройстве. Его нужно распечать, подписать и отослать вместе с "Bescheinigung über Leistungsbezug zur Vorlage beim Beitragsservice von ARD, ZDF und Deutschlandradio" по адресу:
          ARD ZDF Deutschlandradio
          Beitragsservice
          50656 Köln
    Бот с ответами на вопросы:
      - https://t.me/ard_zdf_befreiung
