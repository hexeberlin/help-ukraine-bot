transport:
  description: Общественный транспорт
  contents:
      - |
        Месячный социальный проездной билет Berlin Ticket S для получателей пособий:
        https://sbahn.berlin/tickets/alle-tickets/wochen-monats-abo-jahrestickets/berlin-ticket-s/
        Действует только в зоне АВ. Действует также в последний день месяца, предшествующего месяцу, на который он куплен, и в первый день следующего месяца.
        ‼️ На билет необходимо вписать полное имя и фамилию. С собой иметь копию Bescheid. Без этой информации билет недействителен. Штраф 60 евро. 
        Подробности здесь: https://www.berlin.de/sen/soziales/soziale-sicherung/bn-berlin-ticket-s/

        С этим билетом МОЖНО взять с собой БЕСПЛАТНО:
        ✅ Детей до 6 лет
        ✅ Собаку
        ✅ Небольшое животное размером с кошку
        ✅ Ручную кладь
        ✅ Инвалидную или детскую коляску

        НЕЛЬЗЯ брать с собой
        ⛔️ Других людей
        ⛔️ Велосипед 👉🏼 нужен велосипедный билет Fahrradkarte

        Где купить:
        - в офисах и красных автоматах S-Bahn/Deutsche Bahn
        - в офисах и жёлтых автоматах BVG
        - в газетных киосках и магазинчиках, имеющих наклейку BVG или Tickets

        Цены на обычные (не социальные) проездные билеты:
        Monatskarte (VBB Umweltkarte)
        https://www.bvg.de/de/tickets-und-tarife/alle-tickets/zeitkarten/monatskarte

        Информацию про абонемент Deutschlandticket можно прочитать здесь /Deutschlandticket
