job_center_calc:
  description: Расчёт пособия от Jobcenter при наличии зарплаты (расчет делается на базе сумм нетто) 
  contents:
    - |
      Расчёт Jobcenter на примере зарплаты в 603 EUR (Minijob Brutto = Netto) на взрослого одиночку:
      - Из зарплаты в 603 EUR не учитывается 100 EUR (Freibetrag)
      - Из оставшейся суммы не учитывается ещё 20%

      То есть, Jobсenter считает, что Вы получаете не 603 EUR, а 603 - 100 = 503, 503 - 20% = 402,40.
     
      Например, учет зарплаты взрослого одиночки: Базовое пособие - зарплата = 563 - 402,40 = 160,60 EUR доплата от Jobcenter. В сумме доплата Jobcenter и ваш Minijob 603 EUR получается на 200,60 EUR больше, чем просто пособие от Jobcenter.

      Если Ваш месячный доход выше 603 EUR:
      - Первые 100 EUR не считаются
      - Из остатка до 1000 EUR не считаются еще 30% от суммы
      - Если остаток больше 1000 EUR, то еще 10% не учитываются

      Например, если Jobcenter платит общую сумму в месяц (пособие + квартира) 1200 EUR, а по вышеуказанному расчету получается сумма больше или такая же, то вам перестают выплачивать пособие.
      Если сумма меньше, то вам положена доплата до той суммы, которую бы вы получали, не работая.
      
      - Работающим школьникам и студентам с 01.07.2023 оставляется бОльшая сумма, чем другим категориям.
      
      Детальная информация:
      https://hartz4widerspruch.de/ratgeber/finanzen/einkommen
job_start:
  description: Выход на работу после Jobcenter
  contents:
    - |
      Процесс выхода на работу после Jobcenter:
      1. Получаете трудовой договор на руки, читаете внимательно, подписываете, если все понятно и со всем согласны. Делаете копию для Jobcenter. 
      2. Пишете письмо в Jobcenter о том, что нашли место работы. Выплаты от Jobcenter могут приостановить до получения первого зарплатного листка (Lohnabrechnung) и выписки с банковского счета о поступлении зарплаты (Kontoauszug).
      3. Если с учетом расходов на квартиру у вас будет выходить меньше, чем сейчас, то Jobcenter будет вам доплачивать (Jobcenter считает по спец.формуле). Также (если Jobcenter откажет) у вас будет возможность подать на другой вид соц.помощи: Wohngeld и/или Kinderzuschlag (при наличии детей). При любом из этих вариантов у вас сохраняются соц.льготы - например, соц.билет на проезд и т.д.
      4. До выхода на работу вы также можете подать заявку в Jobcenter на «подъёмные» - Einstiegsgeld. Они вам очень пригодятся. Особенно если Jobcenter остановит вам выплаты сразу после выхода на работу:

      https://www.arbeitsagentur.de/arbeitslos-arbeit-finden/buergergeld/arbeit-finden/einstiegsgeld-fuer-eine-beschaeftigung

      5. Детские деньги (Kindergeld) всегда начисляются сверху зарплаты. В частности, поэтому работать выгоднее, чем нет.
      6. Мед.страховка: работающий будет главный застрахованный, а остальные члены семьи будут «прикреплены» к нему по семейной страховке. Дополнительно платить не надо. Но надо проверить, что в мед.страховке это верно оформлено (Familienversicherung). 
      7. Налоги. Если вам присвоили 1 налоговый класс, но вы можете претендовать на другой (более выгодный для вас) - заполняете спец.формуляр и отправляете его в Finanzamt с подтверждающими документами.
      Прокалькулировать зарплату с разными налоговыми классами можно здесь:

      https://lohntastik.de/gns/kalkulyator-valovoyi-chystoyi-zarplaty/2/2000.0/3/2
      
      8. После получения первой зарплаты уведомляете Jobcenter об этом. В ответ Jobcenter присылает требование предоставить ряд документов. Всё присылаете.
      9. Если вдруг вам лишка заплатили - так бывает, если и пособие и зарплату вы получили в один месяц (т.к. Jobcenter платит вперед, а зарплата приходит в конце месяца за отработанный месяц) - попросят вернуть. Договариваетесь об оплате в рассрочку.
      10. Кауцион за квартиру. Eсли вы брали кредит от Jobcenter на оплату кауциона, то Agentur für Arbeit пришлет вам требование оплатить все оставшуюся сумму или позвонить им, если вы не можете это сделать сразу. Звоните/пишите, договариваетесь о рассрочке. Вам пришлют реквизиты для оплаты и график.
      11. Оплата квартиры. Помните: теперь вы самостоятельно платите за квартиру. Чтобы это происходило автоматически, можно сделать либо SEPA-Lastschrift - тогда арендодатель будет списывать аренду с вашего счета, или Dauerauftrag - тогда ваш банк будет автоматически перечислять аренду арендодателю. 
            
kindergeld:
  description: Как получить пособие на детей Kindergeld
  contents:
    - |
      Как оформить детские деньги (Kindergeld) в Берлине:

      Детские деньги (259 EUR/месяц) выплачиваются также НЕРАБОТАЮЩИМ беженцам из Украины, но засчитываются как доход в выплаты Bürgergeld. Работающим Kindergeld начисляется сверху зарплаты.
      
      Вся информация и формуляры на 3х языках на сайте:
      https://www.arbeitsagentur.de/ru/familie-und-kinder/ru-ukraine-kindergeld
      Формуляры для скачивания на нем/укр/рус языках внизу сайта.

      Необходимые документы:
      - Копии паспортов (или др. удост. личности) и ВНЖ заявителя и ребенка
      - Копии прописки заявителя и ребенка
      - Справка о посещении ребенком школы, проф.обучения или садика (если имеется)

      Заявление + приложение Anlage Kind на каждого ребёнка + копии документов отправлять по почте или на Email (лучше в PDF-формате)
      Почтовый адрес:
      Familienkasse Berlin-Brandenburg
      14465 Potsdam
      *Конверт может быть объемным, сдавайте прямо на почту,чтобы правильно оплатить. Можно заказным (per Einschreiben), с квитанцией, стоит дороже.
      Email: familienkasse-berlin-brandenburg@arbeitsagentur.de

      Если Вы хотите сразу получить подтверждение сдачи заявления (для Jobcenter) и проверить правильность комплекта документов, можете попробовать обратиться в один из 3х филиалов Familienkasse в Берлине. Оттуда Ваши документы перешлют в Потсдам на обработку.

leave:
  description: Как сообщить Jobcenter о временном отсутствии
  contents:
    Правила отсутствия при регистрации в JobCenter по срокам:
      - "до 3 недель: Вы должны предупредить JobCenter об этом заранее и обязательно дождаться их согласия, тогда  Вы получите выплаты за эти 21 день в полном объёме. В 21 день включены и выходные и праздники. По возвращении лично являетесь и сообщаете о своём приезде."
      - "3-6 недель: Вы должны предупредить JobCenter об этом заранее и обязательно дождаться их согласия. В этом случае, Вы получите выплаты за 21 день отсутствия, а за остальные оставшиеся дни - нет. По возвращении лично являетесь и сообщаете о своём приезде."
      - |
        Более 6 недель: Вы должны уведомить JobCenter, но Вы не получите выплат, начиная с первого дня отсутствия. По возвращении Вам нужно будет заново подать заявление на получение пособия в JobCenter и Вашу кандидатуру  будут рассматривать по новой.
    Как уведомить:
      - |
        Если у Вас уже есть доступ в личный кабинет на сайте JobCenter, уведомить о своём отсутствии можно онлайн, заполнив эту форму и прикрепив ее к своему электронному письму: https://www.arbeitsagentur.de/arbeitslosengeld-2/ortsabwesenheit-online-anfragen
    Важно:
      - Выплаты сохраняются на 21 день В ГОД. Периоды отсутсвия сверх этого времени не оплачиваются.
